  var t1W=jurs.length*(nW+gap)-gap,t1X=(W-t1W)/2;

function doSF(name){var inp=document.getElementById('sinp');if(inp){inp.value=name;doSearch(name);}if(srRes.length>0)pickE(srRes[0]);}

function doSearch(q){
  if(!q||q.length<2){document.getElementById('sres').innerHTML='';srRes=[];return;}
  var ql=q.toLowerCase(),res=[];
  for(var i=0;i<D.length;i++){if(D[i].n.toLowerCase().indexOf(ql)>=0||(D[i].p||'').toLowerCase().indexOf(ql)>=0){res.push(D[i]);if(res.length>=12)break;}}
  srRes=res;
  var h='';
  for(var i=0;i<res.length;i++){var e=res[i],c2=JC[e.j]||'#888',bg2=JB[e.j]||'#eee',on2=selE&&selE.n===e.n?'on':'';var safeN=e.n.replace(/\/g,'\\').replace(/'/g,"\'");h+='<div class="sri '+on2+'" onclick="pickE(D.filter(function(x){return x.n===''+safeN+''})[0])"><span class="jt" style="background:'+bg2+';color:'+c2+'">'+e.j+'</span><span style="flex:1">'+e.n+'</span><span style="font-size:10px;color:#aaa">'+(e.p||'').substring(0,14)+'</span></div>';}
  var el=document.getElementById('sres');if(el)el.innerHTML=h;
}

function pickE(e){if(!e)return;selE=e;renderLineage(e);}

function renderLineage(entity){
  var lv=document.getElementById('lview');if(!lv)return;
  var path=findPath(entity.n);
  if(!path||!path.length){lv.innerHTML='<div class="empty">Could not trace path.</div>';return;}
  var h='<div style="font-size:12px;font-weight:700;color:#111;margin-bottom:10px">Ownership chain &mdash; '+entity.n+'</div>';
  for(var i=0;i<path.length;i++){
    var e=path[i],c2=JC[e.j]||'#888',bg2=JB[e.j]||'#eee',isT=i===0,isR=i===path.length-1;
    h+='<div style="display:flex;align-items:stretch;gap:0">';
    h+='<div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0">';
    if(i>0)h+='<div style="width:2px;height:12px;background:'+c2+';opacity:.3"></div>';
    h+='<div style="width:10px;height:10px;border-radius:50%;border:2px solid '+c2+';background:'+(isT?c2:'#fff')+';flex-shrink:0"></div>';
    if(i<path.length-1){var nc=path[i+1]?JC[path[i+1].j]||'#888':'#888';h+='<div style="width:2px;flex:1;min-height:16px;background:'+nc+';opacity:.25"></div>';}
    h+='</div>';
    h+='<div style="flex:1;margin-left:8px;margin-bottom:2px">';
    h+='<div style="background:'+(isT?bg2:'#fff')+';border:'+(isT?'1.5px':'1px')+' solid '+(isT?c2:'#ddd')+';border-radius:8px;padding:10px 12px;margin-bottom:2px">';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span class="jt" style="background:'+bg2+';color:'+c2+'">'+(e.j||'?')+'</span>';
    if(isT)h+='<span style="font-size:10px;font-weight:700;color:'+c2+';text-transform:uppercase">Selected</span>';
    if(isR&&path.length>1)h+='<span style="font-size:10px;font-weight:700;color:#3b6d11;text-transform:uppercase">Root</span>';
    h+='</div><div style="font-size:13px;font-weight:'+(isT?700:400)+';color:#111">'+e.n+'</div>';
    if(e.p)h+='<div style="font-size:11px;color:#aaa;margin-top:2px">'+e.p+'</div>';
    if(i<path.length-1&&path[i+1])h+='<div style="font-size:11px;color:#555;margin-top:4px">Owned by &rarr; <strong>'+path[i+1].n+'</strong></div>';
    h+='</div></div></div>';
  }
  var allJ=[];for(var i=0;i<path.length;i++){if(path[i].j&&path[i].j!=='?'){var found=false;for(var k=0;k<allJ.length;k++){if(allJ[k]===path[i].j){found=true;break;}}if(!found)allJ.push(path[i].j);}}
  h+='<div style="background:#f7f7f5;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;color:#555"><strong>'+path.length+'</strong> levels &mdash; Jurisdictions: '+allJ.join(' &rarr; ')+'</div>';
  lv.innerHTML=h;
}

  document.getElementById('main').innerHTML=h;
}

function render(){renderSB();if(tab==='dashboard')renderDashboard();else if(tab==='entities')renderEntities();else if(tab==='chart')renderChart();else if(tab==='search')renderSearch();else if(tab==='approvals')renderApprovals();else if(tab==='funds')renderFunds();else if(tab==='log')renderLog();}
function go(t){tab=t;var tabs=['dashboard','entities','chart','search','approvals','funds','log'];for(var i=0;i<tabs.length;i++){var el=document.getElementById('tb-'+tabs[i]);if(el)el.className='tb'+(tabs[i]===t?' on':'');}render();}
function setJur(j2){jur=j2;render();}
function switchRole(v){role=v;jur='all';render();}
function notify(msg){document.getElementById('nmsg').innerHTML=msg;document.getElementById('nb').classList.add('on');}

render();
notify('Update from India jurisdiction &mdash; director change on Annecy Solar Pvt Ltd &mdash; pending HQ approval before going live');
</script>
